name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Pegar o código
      uses: actions/checkout@v4

    - name: Instalar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar PyInstaller
      run: pip install pyinstaller

    - name: Criar o executável
      run: pyinstaller --onefile --console *.py

    - name: Salvar o executável
      uses: actions/upload-artifact@v4
      with:
        name: executavel
        path: dist/*.exe
